services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sectors
      POSTGRES_PASSWORD: pass
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5400:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "log_statement=ddl", "-c", "timezone=UTC"]

volumes:
  db_data:
